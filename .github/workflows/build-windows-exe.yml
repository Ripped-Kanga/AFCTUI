name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[gui]"
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller afcgui.spec

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build installer
        run: iscc /DAppVersion=${{ steps.version.outputs.VERSION }} afcgui.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: afcgui-installer-windows
          path: dist/afcgui-setup-${{ steps.version.outputs.VERSION }}.exe
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/afcgui-setup-${{ steps.version.outputs.VERSION }}.exe
